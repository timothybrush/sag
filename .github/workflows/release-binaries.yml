name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build/upload (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          check-latest: true

      - name: Build macOS binaries
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ inputs.tag }}"
          if [ -z "$ref" ]; then ref="${GITHUB_REF_NAME}"; fi
          version="${ref#v}"
          mkdir -p dist/build dist/out

          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -o dist/build/sag-darwin-arm64 ./cmd/sag
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -o dist/build/sag-darwin-amd64 ./cmd/sag

          lipo -create -output dist/build/sag dist/build/sag-darwin-arm64 dist/build/sag-darwin-amd64

          for target in darwin_arm64 darwin_amd64 darwin_universal; do
            rm -rf dist/pkg
            mkdir -p dist/pkg
            cp README.md LICENSE dist/pkg/
            case "$target" in
              darwin_arm64) cp dist/build/sag-darwin-arm64 dist/pkg/sag ;;
              darwin_amd64) cp dist/build/sag-darwin-amd64 dist/pkg/sag ;;
              darwin_universal) cp dist/build/sag dist/pkg/sag ;;
            esac
            tar -C dist/pkg -czf "dist/out/sag_${version}_${target}.tar.gz" sag README.md LICENSE
            shasum -a 256 "dist/out/sag_${version}_${target}.tar.gz" > "dist/out/sag_${version}_${target}.tar.gz.sha256"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: |
            dist/out/*.tar.gz
            dist/out/*.sha256

  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          check-latest: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build Linux binary
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ inputs.tag }}"
          if [ -z "$ref" ]; then ref="${GITHUB_REF_NAME}"; fi
          version="${ref#v}"
          target="linux_${{ matrix.goarch }}"
          mkdir -p dist/pkg dist/out

          CGO_ENABLED=1 GOOS=linux GOARCH="${{ matrix.goarch }}" go build -o dist/pkg/sag ./cmd/sag
          cp README.md LICENSE dist/pkg/
          tar -C dist/pkg -czf "dist/out/sag_${version}_${target}.tar.gz" sag README.md LICENSE
          sha256sum "dist/out/sag_${version}_${target}.tar.gz" > "dist/out/sag_${version}_${target}.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux-${{ matrix.goarch }}
          path: |
            dist/out/*.tar.gz
            dist/out/*.sha256

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          check-latest: true

      - name: Build windows amd64 binary
        shell: pwsh
        run: |
          $ref = "${{ inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($ref)) { $ref = "${env:GITHUB_REF_NAME}" }
          $version = $ref.TrimStart("v")
          New-Item -ItemType Directory -Force -Path dist\out\pkg | Out-Null

          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -o dist\out\pkg\sag.exe .\cmd\sag

          Copy-Item README.md dist\out\pkg\
          Copy-Item LICENSE dist\out\pkg\

          $zip = "dist\out\sag_${version}_windows_amd64.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path dist\out\pkg\sag.exe,dist\out\pkg\README.md,dist\out\pkg\LICENSE -DestinationPath $zip

          (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower() + "  " + (Split-Path $zip -Leaf) | Out-File -Encoding ascii "$zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: |
            dist/out/*.zip
            dist/out/*.sha256

  upload:
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux, build-windows]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten dist
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          find dist -type f -maxdepth 3 -print0 | xargs -0 -I{} cp {} out/

          ref="${{ inputs.tag }}"
          if [ -z "$ref" ]; then ref="${GITHUB_REF_NAME}"; fi
          version="${ref#v}"
          cat out/*.sha256 > "out/sag_${version}_checksums.txt"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: out/*

  update-homebrew-tap:
    runs-on: ubuntu-latest
    needs: upload
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.ref_name }}"
          if [[ -z "$tag" ]]; then
            echo "Missing release tag." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "request_id=sag-${tag}-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Dispatch tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN"
          gh workflow run update-formula.yml \
            --repo steipete/homebrew-tap \
            -f formula=sag \
            -f tag="${{ steps.release.outputs.tag }}" \
            -f repository=steipete/sag \
            -f artifact_template='sag_{version}_{target}.tar.gz' \
            -f request_id="${{ steps.release.outputs.request_id }}"

      - name: Wait for tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for _ in {1..20}; do
            run_id="$(gh run list --repo steipete/homebrew-tap --workflow update-formula.yml --json databaseId,displayTitle --jq '.[] | select(.displayTitle | contains("${{ steps.release.outputs.request_id }}")) | .databaseId' | head -n1)"
            if [[ -n "$run_id" ]]; then
              gh run watch "$run_id" --repo steipete/homebrew-tap --exit-status
              exit 0
            fi
            sleep 5
          done
          echo "Timed out waiting for tap workflow to appear." >&2
          exit 1
